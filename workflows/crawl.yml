name: Discourse Crawler

on:
  workflow_dispatch:
    inputs:
      username:
        description: '要抓取的用户名'
        required: true
        default: '艾小米'
      forum_url:
        description: '论坛地址'
        required: true
        default: 'https://www.uscardforum.com'
  
  schedule:
    - cron: '0 0 * * 1'

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install requests
    
    - name: Run crawler
      run: |
        python3 discourse_crawler.py "${{ github.event.inputs.username || '艾小米' }}" \
          --url "${{ github.event.inputs.forum_url || 'https://www.uscardforum.com' }}" \
          --output-dir ./output
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: crawl-results-${{ github.run_number }}
        path: |
          ./output/*.json
          ./output/*.md
          ./output/*.csv
        retention-days: 30
